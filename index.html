<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Studio</title>
<link rel="stylesheet" href="./css/style.css">


</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">Nova Studio</a>
        <ul class="nav-links">
            <li><a href="#services">Services</a></li>
            <li><a href="#portfolio">Portfolio</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="services" class="services-section">
        <h2 class="section-header">What We Do</h2>
        <div class="services-grid">
            <div class="service-item"><h3>Web Design</h3><p>Modern and responsive.</p></div>
            <div class="service-item"><h3>UI/UX</h3><p>User-centered interfaces.</p></div>
            <div class="service-item"><h3>Branding</h3><p>Visual identity systems.</p></div>
        </div>
    </section>

    <section id="portfolio" class="portfolio-section">
        <h2 class="section-header">Selected Work</h2>
        <div id="portfolio-grid" class="portfolio-grid">
            <!-- کارت‌ها توسط JS اینجا ساخته می‌شوند -->
        </div>
    </section>

    <section id="contact" class="contact-section">
        <h2 class="section-header">Contact Us</h2>
        <form class="contact-form">
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <textarea placeholder="Message"></textarea>
            <button type="submit" class="btn-primary">Send Message</button>
        </form>
    </section>

  <script src="./js/main.js"></script>

</body>
</html>
